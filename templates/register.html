{% load static %}
<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <title>Đăng ký tài khoản</title>
  <link rel="stylesheet" href="{% static 'css/pastel-pink.css' %}">

  <style>
    *{
      box-sizing:border-box;
    }

    body{
      font-family: Arial, sans-serif;
      background:#fff7fa;
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:100vh;
      margin:0;
    }

    .box{
      width:340px;
      max-width:90%;
      background:white;
      padding:24px;
      border-radius:20px;
      box-shadow:0 12px 30px rgba(0,0,0,0.08);
    }

    h2{
      text-align:center;
      color:#c75b8c;
      margin-bottom:20px;
      font-size:24px;
    }

    .normal-input{
      width:100%;
      height:44px;
      padding:10px 12px;
      margin-bottom:12px;
      border:1px solid #f0bfd1;
      border-radius:12px;
      outline:none;
      font-size:14px;
    }

    .normal-input:focus{
      border-color:#e889b0;
      box-shadow:0 0 0 3px rgba(232,137,176,0.18);
    }

    .password-box{
      position:relative;
      width:100%;
      height:44px;
      margin-bottom:12px;
    }

    .password-box input{
      width:100%;
      height:44px;
      padding:10px 42px 10px 12px;
      border:1px solid #f0bfd1;
      border-radius:12px;
      outline:none;
      font-size:14px;
    }

    .password-box input:focus{
      border-color:#e889b0;
      box-shadow:0 0 0 3px rgba(232,137,176,0.18);
    }

    .eye-btn{
      position:absolute;
      right:10px;
      top:50%;
      transform:translateY(-50%);
      width:24px;
      height:24px;
      padding:0;
      margin:0;
      border:none;
      background:transparent;
      color:#c75b8c;
      font-size:16px;
      line-height:1;
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
    }

    .submit-btn{
      width:100%;
      height:44px;
      border:none;
      border-radius:999px;
      background:#e889b0;
      color:white;
      font-weight:bold;
      cursor:pointer;
      margin-top:4px;
    }

    .submit-btn:hover{
      background:#d96f9e;
    }

    .error{
      color:#d63031;
      background:#ffe6ec;
      padding:10px;
      border-radius:12px;
      margin-bottom:12px;
      font-size:14px;
    }

    .links{
      text-align:center;
      margin-top:14px;
    }

    .links a{
      color:#c75b8c;
      text-decoration:none;
      font-weight:600;
    }
  </style>
</head>

<body>
  <div class="box">
    <h2>✨ Đăng ký tài khoản khách</h2>

    {% if error %}
      <div class="error">{{ error }}</div>
    {% endif %}

    <form method="post">
      {% csrf_token %}

      <input class="normal-input" type="text" name="username" placeholder="Tên đăng nhập" required>
      <input class="normal-input" type="email" name="email" placeholder="Email" required>

      <div class="password-box">
<input type="password" name="password" id="password" placeholder="Mật khẩu" required>
        <button class="eye-btn" type="button" onclick="togglePassword('password', this)">👁</button>
      </div>

      <div class="password-box">
        <input type="password" name="confirm_password" id="confirm_password" placeholder="Xác nhận mật khẩu" required>
        <button class="eye-btn" type="button" onclick="togglePassword('confirm_password', this)">👁</button>
      </div>

      <button class="submit-btn" type="submit">Đăng ký</button>
    </form>

    <div class="links">
      <a href="{% url 'user_login' %}">← Quay lại đăng nhập</a>
    </div>
  </div>

  <script>
    function togglePassword(inputId, btn){
      const input = document.getElementById(inputId);

      if(input.type === "password"){
        input.type = "text";
        btn.textContent = "🙈";
      }else{
        input.type = "password";
        btn.textContent = "👁";
      }
    }
  </script>
</body>
</html>
