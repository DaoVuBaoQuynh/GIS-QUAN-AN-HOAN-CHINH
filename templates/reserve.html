{% load static %}
<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8"/>
  <title>Đặt bàn</title>
  <link rel="stylesheet" href="{% static 'css/pastel-pink.css' %}">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #fff7fa;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 560px;
      margin: 40px auto;
      background: white;
      padding: 24px;
      border-radius: 18px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.1);
    }

    h2 {
      text-align: center;
      color: #d94f8a;
      margin-bottom: 16px;
    }

    .back {
      display: block;
      text-align: center;
      margin-bottom: 16px;
      color: #7a2f4d;
      text-decoration: none;
      font-weight: 600;
    }

    .reserve-form label {
      font-weight: 600;
      margin-top: 12px;
      display: block;
      color: #6b3a55;
    }

    .reserve-form input,
    .reserve-form select,
    .reserve-form textarea {
      width: 100%;
      box-sizing: border-box;
      display: block;
      padding: 12px 14px;
      margin-top: 6px;
      border-radius: 14px;
      border: 1px solid #f1b7cc;
      outline: none;
      font-size: 14px;
      background: #fff;
    }

    .reserve-form input[type="datetime-local"] {
      min-height: 46px;
    }

    .reserve-form textarea {
      min-height: 110px;
      resize: vertical;
      border-radius: 14px;
    }

    .reserve-form input:focus,
    .reserve-form select:focus,
    .reserve-form textarea:focus {
      border-color: #f78fb3;
      box-shadow: 0 0 0 3px rgba(247,143,179,0.18);
    }

    button {
      width: 100%;
      margin-top: 18px;
      padding: 12px;
      border-radius: 999px;
      border: none;
      background: linear-gradient(90deg, #f78fb3, #fbc2eb);
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      transform: translateY(-2px);
      background: linear-gradient(90deg, #f06292, #f8a5c2);
    }

    .err {
      background: #ffe5ec;
      color: #c62828;
      padding: 10px;
      border-radius: 10px;
      margin-bottom: 12px;
      text-align: center;
      font-weight: 600;
    }

    .note {
      font-size: 13px;
      color: #8a4b63;
      margin-top: 6px;
    }
  </style>
</head>

<body>

<div class="container">
  <h2>🌸 Đặt bàn</h2>
  <a href="/map/" class="back">← Quay lại bản đồ</a>

  {% if error %}
    <div class="err">{{ error }}</div>
  {% endif %}

  <form method="post" class="reserve-form">
    {% csrf_token %}

    <label>Chọn quán</label>
    <select name="restaurant" required>
      <option value="">-- Chọn quán --</option>
      {% for r in restaurants %}
        <option value="{{ r.id }}" {% if selected_restaurant_id|stringformat:"s" == r.id|stringformat:"s" %}selected{% endif %}>
          {{ r.name }} - {{ r.address }}
        </option>
      {% endfor %}
    </select>

    <label>Tên khách</label>
<input type="text" name="customer_name" placeholder="Nhập tên của bạn" required>

    <label>Số điện thoại</label>
    <input type="tel" name="customer_phone" placeholder="VD: 0987xxxxxx" required>

    <label>Số khách</label>
    <input type="number" name="guests" min="1" value="2" required>

    <label>Loại bàn</label>
    <select name="booking_type" required>
      <option value="normal">🍽️ Bàn thường</option>
      <option value="vip">🌟 Bàn VIP</option>
    </select>
    <div class="note">VIP thường có vị trí đẹp hơn / riêng tư hơn</div>

    <label>Thời gian</label>
    <input type="datetime-local" name="booking_time" required>

    <label>Ghi chú</label>
    <textarea name="note" placeholder="Ví dụ: sinh nhật, gần cửa sổ..."></textarea>

    <button type="submit">💖 Gửi yêu cầu đặt bàn</button>
  </form>
</div>

</body>
</html>
