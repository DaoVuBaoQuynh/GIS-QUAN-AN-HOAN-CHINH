{% load static %}
<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <title>Đăng nhập nhân viên</title>
  <link rel="stylesheet" href="{% static 'css/pastel-pink.css' %}">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #fff7fa, #ffeef5);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-box {
      width: 380px;
      background: white;
      border-radius: 20px;
      padding: 28px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.08);
      border: 1px solid #f6dbe6;
    }

    h2 {
      margin-top: 0;
      text-align: center;
      color: #cf6d97;
    }

    p.sub {
      text-align: center;
      color: #8f6a79;
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-top: 12px;
      margin-bottom: 6px;
      color: #6a4b58;
      font-weight: 600;
    }

    input {
      width: 100%;
      box-sizing: border-box;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid #f1b7cc;
      outline: none;
    }

    button {
      width: 100%;
      margin-top: 18px;
      padding: 12px;
      border: none;
      border-radius: 999px;
      background: #f59cb8;
      color: white;
      font-weight: 700;
      cursor: pointer;
    }

    .err {
      margin-top: 12px;
      color: #c0392b;
      background: #fdecec;
      padding: 10px 12px;
      border-radius: 10px;
      font-size: 14px;
    }

    .links {
      margin-top: 18px;
      text-align: center;
      font-size: 14px;
    }

    .links a {
      color: #c75b8c;
      text-decoration: none;
      margin: 0 6px;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <h2>👩‍🍳 Đăng nhập nhân viên</h2>
    <p class="sub">Dành cho nhân viên quán ăn</p>

    <form method="post">
      {% csrf_token %}

      <label>Tên đăng nhập</label>
      <input type="text" name="username" required>

      <label>Mật khẩu</label>
      <input type="password" name="password" required>

      <button type="submit">Đăng nhập Staff</button>
    </form>

    {% if error %}
      <div class="err">{{ error }}</div>
    {% endif %}

    <div class="links">
      <a href="/">Về trang chủ</a>
      <a href="{% url 'user_login' %}">Đăng nhập khách</a>
      <a href="{% url 'admin_login' %}">Đăng nhập admin</a>
    </div>
  </div>
</body>
</html>
